<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apalabrados Bot — Encuentra la Mejor Jugada</title>
    <meta name="description"
        content="Herramienta gratuita para Apalabrados: analiza tu tablero y encuentra la jugada con más puntos. Sube una captura o introduce las fichas manualmente.">
    <meta name="keywords"
        content="apalabrados, scrabble español, mejor jugada, calculadora apalabrados, ayuda apalabrados">
    <meta name="author" content="Apalabrados Bot">
    <link rel="canonical" href="https://apalabrados-bot.up.railway.app/">
    <!-- Open Graph -->
    <meta property="og:title" content="Apalabrados Bot — Encuentra la Mejor Jugada">
    <meta property="og:description"
        content="Analiza tu partida de Apalabrados y descubre la jugada óptima. Gratis y sin registro.">
    <meta property="og:url" content="https://apalabrados-bot.up.railway.app/">
    <meta property="og:type" content="website">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Apalabrados Bot">
    <meta name="twitter:description" content="Encuentra la mejor jugada en Apalabrados automáticamente.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4577641786728311"
        crossorigin="anonymous"></script>
    <!-- Google Analytics (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-M9JT8325C8"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-M9JT8325C8');
    </script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body>
    <div class="app-container">
        <header>
            <div class="header-main">
                <h1>Apalabrados</h1>
                <!-- User Profile / Login -->
                <div id="user-profile" class="user-profile">
                    <button id="login-btn" class="login-btn">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"
                            alt="G">
                        Entrar con Google
                    </button>
                </div>
            </div>
            <p>Haz clic en cualquier casilla y teclea para replicar las jugadas de tu rival.<br>Usa <b>Shift + Letra</b>
                para colocar el comodín del oponente (0 puntos).</p>
        </header>
        <main class="main-dashboard">
            <div class="left-column">
                <div id="board" class="board"></div>
                <div class="legend-compact">
                    <div class="legend-item"><span class="legend-color dl"></span><span>DL</span></div>
                    <div class="legend-item"><span class="legend-color tl"></span><span>TL</span></div>
                    <div class="legend-item"><span class="legend-color dp"></span><span>DP</span></div>
                    <div class="legend-item"><span class="legend-color tp"></span><span>TP</span></div>
                </div>
            </div>

            <div class="right-column">
                <div class="solver-panel">
                    <div class="rack-container">
                        <h3>Tu Atril</h3>
                        <div id="rack" class="rack">
                            <input type="text" class="rack-input" maxlength="1" data-index="0">
                            <input type="text" class="rack-input" maxlength="1" data-index="1">
                            <input type="text" class="rack-input" maxlength="1" data-index="2">
                            <input type="text" class="rack-input" maxlength="1" data-index="3">
                            <input type="text" class="rack-input" maxlength="1" data-index="4">
                            <input type="text" class="rack-input" maxlength="1" data-index="5">
                            <input type="text" class="rack-input" maxlength="1" data-index="6">
                        </div>
                        <p class="rack-hint">Usa '*' para el comodín vacío.</p>
                    </div>

                    <div class="action-buttons">
                        <button id="solve-btn" class="solve-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                            </svg>
                            Calcular
                        </button>
                        <button id="import-board-btn" class="import-btn" title="Cargar imagen">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <polyline points="21 15 16 10 5 21"></polyline>
                            </svg>
                        </button>
                        <button id="clear-board-btn" class="clear-btn" title="Vaciar tablero">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path
                                    d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2">
                                </path>
                            </svg>
                        </button>
                    </div>

                    <input type="file" id="import-board-input" accept="image/*" style="display: none;">

                    <div id="ocr-status" class="ocr-status hidden">
                        <div class="ocr-spinner"></div>
                        <span id="ocr-status-text">Analizando...</span>
                    </div>

                    <!-- OCR interactivos dentro del panel -->
                    <div id="ocr-controls" class="hidden">
                        <div class="ocr-sliders">
                            <label>Zoom: <input type="range" id="ocr-zoom" min="60" max="130" value="98"></label>
                            <label>X: <input type="range" id="ocr-x" min="-100" max="100" value="0"></label>
                            <label>Y: <input type="range" id="ocr-y" min="-100" max="100" value="0"></label>
                        </div>
                        <button id="ocr-start-btn" class="solve-btn ocr-confirm-btn">Confirmar OCR</button>
                    </div>
                </div>

                <div id="results-panel" class="results-panel hidden">
                    <div class="panel-header">
                        <h3>Mejores Jugadas</h3>
                    </div>
                    <ul id="results-list" class="results-list"></ul>
                </div>
            </div>

            <canvas id="ocr-canvas" style="display:none;"></canvas>
        </main>
        <footer>
            <div style="text-align:center; font-size:0.75rem; color:#94a3b8;">
                <a href="/privacy.html" style="color:#94a3b8; margin-right:12px; text-decoration: none;">Privacidad</a>
                <a href="/terms.html" style="color:#94a3b8; margin-right:12px; text-decoration: none;">Términos</a>
                <span>&copy; 2026 Apalabrados Bot</span>
            </div>
        </footer>
    </div>
    <!-- monetization.js: debe cargarse primero para que UsageTracker esté disponible -->
    <script src="firebase-config.js?v=3"></script>
    <script src="monetization.js?v=3"></script>
    <script src="firebase-auth.js?v=2"></script>
    <script src="script.js?v=17"></script>
    <script src="ocr.js?v=17"></script>
    <script src="solver.js?v=17"></script>
</body>

</html>
